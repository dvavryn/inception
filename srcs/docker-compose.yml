services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    image: mariadb
    env_file: .env
    volumes:
      - db_volume:/var/lib/mysql
    networks:
      - inception
    restart: unless-stopped
    secrets:
      - db_password
      - db_root_password
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    image: wordpress
    env_file: .env
    volumes:
      - wp_volume:/var/www/html
    networks:
      - inception
    restart: unless-stopped
    depends_on:
      - mariadb
    secrets:
      - db_password
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    image: nginx
    env_file: .env
    volumes:
      - wp_volume:/var/www/html
    ports:
      - "443:443"
    networks:
      - inception
    restart: unless-stopped
    depends_on:
      - wordpress
volumes:
  db_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/db
  wp_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/wordpress
networks:
  inception:
    driver: bridge
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt